<!-- templates/user_settings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthSync - Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <main class="page-body">
    <div class="main-content">
      <header class="top-header">
        <h1 class="logo-title">HealthSync</h1>
        <p class="sub-title">Settings</p>
      </header>

      <main class="container" style="padding-top: 20px;">
        <div style="text-align:center; margin-bottom:18px;">
          <i class="fas fa-user-circle" style="font-size:64px; color:#333;"></i>
          <h2 style="font-size:18px; margin:10px 0 2px;">{{ username }}</h2>
        </div>

        <!-- Settings Function -->
        <a class="data-box no-link" href="{{ url_for('glucose.api_glucose', days=7) }}" target="_blank" rel="noopener">
          <span><i class="fa-solid fa-code" style="margin-right:8px;"></i>Open API: /api/glucose</span>
          <i class="fas fa-chevron-right"></i>
        </a>

        <a class="data-box no-link" href="{{ url_for('glucose.api_glucose_stats', days=7) }}" target="_blank" rel="noopener">
          <span><i class="fa-solid fa-chart-simple" style="margin-right:8px;"></i>Open API: /api/glucose/stats</span>
          <i class="fas fa-chevron-right"></i>
        </a>

        <div style="text-align:center; margin-top:18px;">
          <a href="{{ url_for('auth.logout') }}" class="outline-button" style="display:inline-block; text-decoration:none;">
            Sign Out
          </a>
        </div>
      </main>
    </div>
  </main>

  {% include 'footer.html' %}
</body>
</html>
